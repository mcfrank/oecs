{{ define "title" }}{{ .Title }} · {{ .Site.Title }}{{ end }}
{{ define "main" }}
<div class="oecs-list">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="thematic-collections-grid">
    {{ range .Pages.ByTitle }}
    {{ if ne .Params.slug "search" }}
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ end }}
    {{ end }}
  </div>
</div>
{{ end }}
